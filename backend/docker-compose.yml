services:
  postgres:
    image: postgres:17
    container_name: moneymap-postgres
    ports:
      - "6543:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: moneymap
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - moneymap-postgres-data:/var/lib/postgresql/data

volumes:
  moneymap-postgres-data: